<!DOCTYPE html>
<html>
<head>
  <title>HockeyNative Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: #0a1f36;
      color: white;
      font-family: -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #0b1220;
      padding: 20px;
      border-radius: 20px;
      width: 90%;
      max-width: 700px;
    }

    video {
      width: 100%;
      border-radius: 12px;
      margin-top: 15px;
      background: black;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>HockeyNative Drill Video</h2>

    <video
      id="video"
      controls
      playsinline
      preload="auto"
    ></video>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
      document.body.innerHTML = "<h2>Invalid link</h2>";
    } else {
      fetch(`https://fyncbcraeayyrrvfhgdj.supabase.co/rest/v1/shared_videos?id=eq.${id}`, {
        headers: {
          apikey: "sb_publishable_q5p6ovKanp6wiciGYd2ZdQ_fhDajPG6",
          Authorization: "Bearer sb_publishable_q5p6ovKanp6wiciGYd2ZdQ_fhDajPG6",
        },
      })
        .then(res => res.json())
        .then(data => {
          if (data.length > 0) {
            const video = document.getElementById("video");

            const storagePath = data[0].url;

            const videoUrl =
              `https://fyncbcraeayyrrvfhgdj.supabase.co/storage/v1/object/public/drill-videos/${encodeURI(storagePath)}`;

            console.log("Video URL:", videoUrl);

            video.src = videoUrl;
            video.load();
          } else {
            document.body.innerHTML = "<h2>Video not found</h2>";
          }
        })
        .catch((err) => {
          console.error(err);
          document.body.innerHTML = "<h2>Error loading video</h2>";
        });
    }
  </script>
</body>
</html>
